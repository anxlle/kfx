name: CI/CD КФХ "Саянские Несушки"

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

env:
  NODE_VERSION: '20'
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_pass
  POSTGRES_DB: nesushki_test

jobs:

  backend-ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Initialize and Install Backend Dependencies
        run: |
          mkdir -p backend && cd backend
          npm init -y
          npm install express pg sequelize dotenv
          npx npm-add-script -k "lint" -v "echo 'No lint specified'"
          npx npm-add-script -k "db:migrate" -v "echo 'No migrations specified'"
          npx npm-add-script -k "test" -v "echo 'No tests specified'" --force

      - name: Run Linter
        run: cd backend && npm run lint

      - name: Run DB Migrations
        run: cd backend && npm run db:migrate
        env:
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}

      - name: Run Backend Tests
        run: cd backend && npm test
        env:
          DATABASE_URL: postgresql://${{ env.POSTGRES_USER }}:${{ env.POSTGRES_PASSWORD }}@localhost:5432/${{ env.POSTGRES_DB }}
          JWT_SECRET: test_secret_for_ci

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Scaffold and Install Vue Dependencies
        run: |
          # Создаем проект во временной папке без интерактива
          npm create vue@latest -- tmp-vue-project --default
          
          # Создаем целевую папку frontend
          mkdir -p frontend
          
          # Переносим файлы (включая скрытые конфигурации)
          shopt -s dotglob
          mv tmp-vue-project/* frontend/
          
          # Устанавливаем зависимости
          cd frontend && npm install

      - name: Build Vue App
        run: |
          cd frontend
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: ./frontend/dist/
          retention-days: 7

  smoke-test:
    needs: [backend-ci, frontend-ci]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Run Smoke Checks
        run: |
          echo "Все директории успешно инициализированы и собраны!"
